name: Price Tracker

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'  # 6am, noon, 6pm, midnight UTC (2am/8am/2pm/8pm ET)
  workflow_dispatch:               # Allow manual runs from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_ACTIONS: 'true'
        run: python price_tracker.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp dashboard.html index.html
          git add prices_history.json dashboard.html index.html camel_seen.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push

  deploy:
    needs: track
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
